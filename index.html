<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과사람 자사관 | 선생님 가이드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Pretendard', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <style>
    html, body { height: 100%; overflow: hidden; }
    .grain::after {
      content: ''; position: fixed; inset: 0; z-index: 60; pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .reveal { opacity: 0; animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .d1 { animation-delay: 100ms; }
    .d2 { animation-delay: 200ms; }
    .d3 { animation-delay: 300ms; }

    .doc-card {
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .doc-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 48px -12px rgba(0,0,0,0.5);
    }
    .doc-card:active { transform: scale(0.98); }
    .doc-card .arrow { opacity: 0; transition: all 0.3s ease; }
    .doc-card:hover .arrow { opacity: 1; transform: translateX(6px); }

    .break-keep { word-break: keep-all; overflow-wrap: break-word; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased grain">

  <!-- Background -->
  <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute w-[500px] h-[500px] bg-sky-500/[0.05] rounded-full blur-[140px] -top-[10%] right-[10%]"></div>
    <div class="absolute w-[400px] h-[400px] bg-emerald-500/[0.04] rounded-full blur-[120px] bottom-[10%] -left-[5%]"></div>
  </div>

  <!-- Full viewport -->
  <div class="relative z-10 h-full flex flex-col items-center justify-center px-6">

    <!-- Header -->
    <div class="text-center mb-10 reveal">
      <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-zinc-800/60 border border-zinc-700/40 mb-6">
        <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
        <span class="text-xs font-semibold text-zinc-300 tracking-tight">과사람 자사관</span>
        <div class="w-px h-3 bg-zinc-700"></div>
        <span class="text-[11px] text-zinc-500">선생님 가이드</span>
      </div>
      <h1 class="text-3xl md:text-4xl font-bold tracking-tight break-keep">
        필요한 문서를 선택하세요
      </h1>
    </div>

    <!-- Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl w-full">

      <!-- 빠른 참조카드 -->
      <a href="MANUAL.html" class="doc-card reveal d1 relative rounded-2xl bg-zinc-900/50 backdrop-blur-xl border border-white/[0.06] p-8 flex flex-col overflow-hidden">
        <div class="absolute top-0 right-0 w-48 h-48 bg-sky-500/[0.06] rounded-full blur-[80px] pointer-events-none"></div>
        <div class="relative z-10 flex flex-col h-full">
          <div class="flex items-center justify-between mb-6">
            <div class="w-14 h-14 rounded-2xl bg-sky-500/10 border border-sky-500/20 flex items-center justify-center">
              <iconify-icon icon="solar:document-bold-duotone" width="28" class="text-sky-400"></iconify-icon>
            </div>
            <div class="arrow flex items-center gap-1.5 text-sm text-sky-400 font-medium">
              열기 <iconify-icon icon="solar:arrow-right-linear" width="16"></iconify-icon>
            </div>
          </div>
          <div class="text-[10px] font-bold text-sky-400/70 tracking-widest uppercase mb-2">Quick Reference</div>
          <h2 class="text-2xl font-bold tracking-tight break-keep mb-3">빠른 참조카드</h2>
          <p class="text-zinc-500 text-sm leading-relaxed break-keep flex-1">
            업무에 바로 활용할 수 있는 핵심 내용을 한 장에 정리한 참조카드입니다.
          </p>
          <div class="mt-5 flex items-center gap-2 text-xs text-zinc-600">
            <iconify-icon icon="solar:file-text-linear" width="14"></iconify-icon>
            MANUAL.html
          </div>
        </div>
      </a>

      <!-- 담임 가이드 -->
      <a href="GUIDE.html" class="doc-card reveal d2 relative rounded-2xl bg-zinc-900/50 backdrop-blur-xl border border-white/[0.06] p-8 flex flex-col overflow-hidden">
        <div class="absolute bottom-0 left-0 w-48 h-48 bg-emerald-500/[0.06] rounded-full blur-[80px] pointer-events-none"></div>
        <div class="relative z-10 flex flex-col h-full">
          <div class="flex items-center justify-between mb-6">
            <div class="w-14 h-14 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center">
              <iconify-icon icon="solar:notebook-bold-duotone" width="28" class="text-emerald-400"></iconify-icon>
            </div>
            <div class="arrow flex items-center gap-1.5 text-sm text-emerald-400 font-medium">
              열기 <iconify-icon icon="solar:arrow-right-linear" width="16"></iconify-icon>
            </div>
          </div>
          <div class="text-[10px] font-bold text-emerald-400/70 tracking-widest uppercase mb-2">Teacher Guide</div>
          <h2 class="text-2xl font-bold tracking-tight break-keep mb-3">담임 가이드</h2>
          <p class="text-zinc-500 text-sm leading-relaxed break-keep flex-1">
            담임 선생님을 위한 상세 업무 가이드입니다. 단계별 절차와 유의사항을 확인하세요.
          </p>
          <div class="mt-5 flex items-center gap-2 text-xs text-zinc-600">
            <iconify-icon icon="solar:file-text-linear" width="14"></iconify-icon>
            GUIDE.html
          </div>
        </div>
      </a>

    </div>

    <!-- Footer -->
    <div class="mt-10 text-[10px] text-zinc-700 reveal d3">
      2026 과사람 자사관 · 선생님 업무 지원 문서
    </div>

  </div>

</body>
</html>
